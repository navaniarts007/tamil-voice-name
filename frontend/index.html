<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0f172a" />
  <title>Tamil Voice → English Name</title>
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <style>
    :root {
      --bg: #f7f8fb;
      --panel: #ffffff;
      --fg: #0b1220;
      --fg-2: #334155;
      --muted: #64748b;
      --muted-2: #94a3b8;
      --primary: #1d4ed8;
      --primary-dark: #1e3a8a;
      --primary-soft: rgba(29, 78, 216, 0.08);
      --accent: #059669;
      --accent-soft: #ecfdf5;
      --danger: #dc2626;
      --warn: #d97706;
      --border: #e2e8f0;
      --border-strong: #cbd5e1;
      --card: #fbfcfe;
      --radius-sm: 8px;
      --radius: 12px;
      --radius-lg: 18px;
      --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.06);
      --shadow: 0 4px 20px -4px rgba(15, 23, 42, 0.1);
      --shadow-lg: 0 20px 48px -20px rgba(15, 23, 42, 0.18);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
      -webkit-font-smoothing: antialiased;
    }
    .app {
      max-width: 720px;
      margin: 0 auto;
      padding: 32px 24px 80px;
    }

    /* Header */
    header.app-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px;
    }
    header.app-header .brand {
      display: flex; align-items: center; gap: 10px;
    }
    header.app-header .brand-mark {
      width: 34px; height: 34px; border-radius: 10px;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      display: grid; place-items: center;
      color: white; font-size: 17px;
      box-shadow: var(--shadow-sm);
    }
    header.app-header h1 {
      margin: 0; font-size: 16px; font-weight: 600;
      letter-spacing: -0.01em;
    }
    header.app-header .sub {
      color: var(--muted); font-size: 12px; margin-top: 2px;
    }
    .backend-tag {
      font-size: 11px; font-weight: 600;
      padding: 4px 10px; border-radius: 999px;
      background: var(--primary-soft); color: var(--primary);
      letter-spacing: 0.02em;
    }

    /* Mic card */
    .mic-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 32px 24px 24px;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .mic-wrap { position: relative; display: inline-block; }
    .mic-btn {
      width: 120px; height: 120px; border-radius: 50%; border: none;
      background: linear-gradient(180deg, #2563eb 0%, #1d4ed8 100%);
      color: white; font-size: 44px; cursor: pointer;
      box-shadow: 0 10px 32px -6px rgba(29, 78, 216, 0.45);
      transition: transform 100ms ease, background 120ms ease, box-shadow 160ms ease;
      display: grid; place-items: center;
    }
    .mic-btn:hover {
      background: linear-gradient(180deg, #1d4ed8 0%, #1e3a8a 100%);
      box-shadow: 0 14px 38px -6px rgba(29, 78, 216, 0.55);
    }
    .mic-btn.recording {
      background: linear-gradient(180deg, #ef4444 0%, #b91c1c 100%);
      animation: pulse 1.3s ease-in-out infinite;
    }
    .mic-btn.transcribing {
      background: linear-gradient(180deg, #f59e0b 0%, #b45309 100%);
      cursor: wait;
    }
    .mic-btn:active:not(.transcribing) { transform: scale(0.97); }
    @keyframes pulse {
      0%,100% { box-shadow: 0 10px 32px -6px rgba(239,68,68,0.55), 0 0 0 0 rgba(239,68,68,0.45); }
      50%    { box-shadow: 0 10px 32px -6px rgba(239,68,68,0.55), 0 0 0 24px rgba(239,68,68,0); }
    }

    .mic-label {
      margin-top: 18px; font-size: 14px; font-weight: 500; color: var(--fg-2);
    }
    .mic-label .hint { color: var(--muted); font-weight: 400; margin-left: 4px; }

    /* Heard */
    .heard {
      margin-top: 20px;
      padding: 16px 18px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      min-height: 54px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      font-size: 15px; color: var(--muted);
      text-align: center;
    }
    .heard strong {
      color: var(--fg); font-weight: 600; font-size: 18px;
      letter-spacing: -0.01em;
    }
    .heard.empty { color: var(--muted-2); font-style: italic; }

    /* Action row */
    .action-row {
      display: flex; gap: 10px; justify-content: center; margin-top: 18px;
    }
    .btn {
      padding: 10px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border);
      background: white; cursor: pointer; font-size: 13px; font-weight: 500;
      color: var(--fg-2); transition: all 120ms ease;
      font-family: inherit;
    }
    .btn:hover { background: var(--card); border-color: var(--border-strong); }
    .btn.primary { background: var(--primary); color: white; border-color: var(--primary); }
    .btn.primary:hover { background: var(--primary-dark); }

    /* Selected */
    .selected {
      margin-top: 20px;
      padding: 18px 20px;
      border-radius: var(--radius);
      background: var(--accent-soft);
      color: #065f46;
      border: 1px solid #a7f3d0;
      display: none;
      text-align: left;
    }
    .selected.show { display: flex; align-items: center; gap: 12px; }
    .selected .check {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--accent); color: white;
      display: grid; place-items: center;
      font-size: 14px; flex-shrink: 0;
    }
    .selected .name { font-weight: 600; font-size: 18px; line-height: 1.2; }
    .selected .hint { font-size: 12px; color: #059669aa; margin-top: 2px; }

    /* Suggestions */
    .suggestions-wrap { margin-top: 24px; }
    .suggestions-header {
      font-size: 11px; font-weight: 700; color: var(--muted);
      margin-bottom: 12px;
      text-transform: uppercase; letter-spacing: 0.08em;
      display: flex; align-items: center; gap: 10px;
    }
    .suggestions-header::before {
      content: ""; flex: 0 0 auto; width: 18px; height: 1px; background: var(--border-strong);
    }
    .suggestions-header::after {
      content: ""; flex: 1 1 auto; height: 1px; background: var(--border);
    }
    .suggestions-header.more-header {
      margin-top: 24px; color: var(--muted-2);
    }

    /* Featured (primary) ASR card — larger hero */
    ul.suggestions-primary {
      list-style: none; margin: 0; padding: 0;
    }
    ul.suggestions-primary li.suggestion {
      padding: 20px 22px; gap: 16px;
      border: 1.5px solid var(--primary);
      box-shadow: 0 8px 28px -8px rgba(29, 78, 216, 0.25);
    }
    ul.suggestions-primary .avatar {
      width: 56px; height: 56px; font-size: 18px;
    }
    ul.suggestions-primary .suggestion .name { font-size: 20px; }

    ul.suggestions {
      list-style: none; margin: 0; padding: 0;
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;
    }
    @media (max-width: 640px) { ul.suggestions { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 440px) { ul.suggestions { grid-template-columns: 1fr; } }

    li.suggestion {
      padding: 14px 16px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      display: flex; align-items: center; gap: 12px;
      transition: all 120ms ease;
      box-shadow: var(--shadow-sm);
    }
    li.suggestion:hover {
      border-color: var(--primary);
      transform: translateY(-1px);
      box-shadow: var(--shadow);
    }
    li.suggestion:active { transform: translateY(0); }
    li.suggestion.flash {
      background: var(--accent-soft);
      border-color: var(--accent);
    }
    li.suggestion.flash .avatar { background: var(--accent); }
    .avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      color: white;
      display: grid; place-items: center;
      font-weight: 600; font-size: 14px;
      flex-shrink: 0;
      letter-spacing: 0.02em;
    }
    .suggestion-body { flex: 1; min-width: 0; }
    .suggestion .name {
      font-weight: 600; font-size: 16px; line-height: 1.25;
      color: var(--fg);
      letter-spacing: -0.005em;
    }
    .suggestion .ta {
      color: var(--muted); font-weight: 400; font-size: 12px; margin-top: 2px;
    }
    .suggestion-meta {
      display: flex; align-items: center; gap: 8px; margin-top: 6px;
    }
    .source-pill {
      font-size: 9.5px; padding: 2px 7px; border-radius: 999px;
      font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
    }
    .source-pill.asr { background: #dcfce7; color: #15803d; }
    .source-pill.sarvam { background: #ede9fe; color: #6d28d9; }
    .source-pill.variant { background: #fef3c7; color: #92400e; }
    .score {
      font-variant-numeric: tabular-nums; color: var(--muted-2); font-size: 11px;
    }

    .empty {
      text-align: center; color: var(--muted-2);
      padding: 24px 12px; font-size: 13px;
      grid-column: 1/-1;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }

    /* Fallback search */
    details.fallback {
      margin-top: 28px; color: var(--muted); font-size: 12px;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px;
    }
    details.fallback summary {
      cursor: pointer; font-weight: 500; color: var(--fg-2);
      list-style: none;
    }
    details.fallback summary::-webkit-details-marker { display: none; }
    details.fallback summary::before { content: "⌨ "; margin-right: 4px; }
    .search-row {
      display: flex; gap: 8px; padding-top: 14px; margin-top: 10px;
      border-top: 1px dashed var(--border);
    }
    .search-row input {
      flex: 1; padding: 10px 14px;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      font-size: 14px; color: var(--fg); background: white;
      font-family: inherit;
    }
    .search-row input:focus {
      outline: none; border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-soft);
    }

    .status {
      margin-top: 20px; text-align: center;
      font-size: 11px; color: var(--muted-2); min-height: 16px;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="brand">
        <div class="brand-mark">🎙️</div>
        <div>
          <h1>Tamil Voice → English Name</h1>
          <div class="sub">Sarvam AI speech-to-text + live spelling suggestions</div>
        </div>
      </div>
      <span class="backend-tag" id="backendTag">loading…</span>
    </header>

    <div class="mic-card">
      <div class="mic-wrap">
        <button id="micBtn" class="mic-btn" title="Click to record">🎤</button>
      </div>
      <div class="mic-label" id="micLabel">
        Tap the mic and speak a Tamil name
      </div>
      <div class="heard empty" id="heard">Waiting for speech…</div>
      <div class="action-row">
        <button id="resetBtn" class="btn">Clear</button>
      </div>
    </div>

    <div class="selected" id="selected"></div>

    <div class="suggestions-wrap">
      <div class="suggestions-header" id="suggestionsHeader" style="display:none;">
        Primary — what Sarvam ASR heard
      </div>
      <ul class="suggestions-primary" id="primarySuggestions">
        <li class="empty">Speak a name to get a suggestion.</li>
      </ul>
      <div class="suggestions-header more-header" id="moreHeader" style="display:none;">
        Alternate English spellings
      </div>
      <ul class="suggestions" id="moreSuggestions"></ul>
    </div>

    <details class="fallback">
      <summary>Type a name instead</summary>
      <div class="search-row">
        <input id="textQuery" type="text" placeholder="e.g. thangamuthu, prithi, vadivel" />
        <button id="searchBtn" class="btn primary">Search</button>
      </div>
    </details>

    <div class="status" id="status"></div>
  </div>

<script>
(() => {
  const micBtn = document.getElementById("micBtn");
  const micLabel = document.getElementById("micLabel");
  const resetBtn = document.getElementById("resetBtn");
  const heardEl = document.getElementById("heard");
  const suggestionsEl = document.getElementById("primarySuggestions");
  const moreSuggestionsEl = document.getElementById("moreSuggestions");
  const suggestionsHeader = document.getElementById("suggestionsHeader");
  const moreHeader = document.getElementById("moreHeader");
  const selectedEl = document.getElementById("selected");
  const statusEl = document.getElementById("status");
  const textQuery = document.getElementById("textQuery");
  const searchBtn = document.getElementById("searchBtn");
  const backendTag = document.getElementById("backendTag");

  let audioCtx = null, mediaStream = null;
  let sourceNode = null, processorNode = null;
  let recording = false, transcribing = false;
  const TARGET_SR = 16000;
  let pcmChunks = [];

  // --- auto-stop on silence (VAD) ---
  const VAD_SILENCE_RMS = 0.012;
  const VAD_SILENCE_MS  = 1100;
  const VAD_MIN_VOICE_MS = 450;
  let vadLastVoiceMs = 0;
  let vadVoiceAccumMs = 0;
  let vadTimer = null;

  function setStatus(txt) { statusEl.innerHTML = txt || ""; }
  function setMicLabel(txt, hint) {
    micLabel.innerHTML = txt + (hint ? ` <span class="hint">${hint}</span>` : "");
  }
  function setHeard(state, text) {
    heardEl.classList.remove("empty");
    if (state === "empty")      { heardEl.innerHTML = '<span>Waiting for speech…</span>'; heardEl.classList.add("empty"); }
    else if (state === "listening") { heardEl.innerHTML = '🔴 Listening…'; heardEl.classList.add("empty"); }
    else if (state === "transcribing") { heardEl.innerHTML = '⏳ Transcribing…'; heardEl.classList.add("empty"); }
    else if (state === "text")  { heardEl.innerHTML = `<span>Heard</span> <strong>${text}</strong>`; }
    else if (state === "typed") { heardEl.innerHTML = `<span>Typed</span> <strong>${text}</strong>`; }
    else if (state === "failed"){ heardEl.innerHTML = `<span style="color:var(--danger)">⚠️ Didn't catch that — try again</span>`; heardEl.classList.add("empty"); }
  }
  function initials(name) {
    if (!name) return "?";
    const p = name.trim().split(/\s+/);
    return ((p[0]?.[0] ?? "") + (p.length > 1 ? p[p.length - 1][0] : "")).toUpperCase() || "?";
  }

  function buildCard(s) {
    const li = document.createElement("li");
    li.className = "suggestion";
    li.innerHTML = `
      <div class="avatar">${initials(s.name)}</div>
      <div class="suggestion-body">
        <div class="name">${s.name}</div>
        ${s.name_ta ? `<div class="ta">${s.name_ta}</div>` : ""}
        <div class="suggestion-meta">
          <span class="source-pill ${s.source}">${s.source}</span>
          <span class="score">${s.score ?? ""}</span>
        </div>
      </div>
    `;
    li.addEventListener("click", () => {
      document.querySelectorAll("li.suggestion").forEach(el => el.classList.remove("flash"));
      li.classList.add("flash");
      selectedEl.innerHTML = `
        <div class="check">✓</div>
        <div>
          <div class="name">${s.name}</div>
          <div class="hint">Copied to clipboard — paste into the EMR</div>
        </div>
      `;
      selectedEl.classList.add("show");
      if (navigator.clipboard) navigator.clipboard.writeText(s.name).catch(() => {});
    });
    return li;
  }

  function renderSuggestions(list) {
    suggestionsEl.innerHTML = "";
    moreSuggestionsEl.innerHTML = "";
    if (!list || list.length === 0) {
      const li = document.createElement("li");
      li.className = "empty";
      li.textContent = "No suggestions yet.";
      suggestionsEl.appendChild(li);
      suggestionsHeader.style.display = "none";
      moreHeader.style.display = "none";
      return;
    }
    suggestionsHeader.style.display = "flex";
    // First card = primary (ASR, large). Rest = alternate spellings below.
    const primary = list.slice(0, 1);
    const extra = list.slice(1);
    primary.forEach(s => suggestionsEl.appendChild(buildCard(s)));
    if (extra.length > 0) {
      moreHeader.style.display = "flex";
      extra.forEach(s => moreSuggestionsEl.appendChild(buildCard(s)));
    } else {
      moreHeader.style.display = "none";
    }
  }

  function updateBackendStatus(data) {
    const srcs = data.sources || {};
    const parts = [];
    if (srcs.asr) parts.push(`${srcs.asr} asr`);
    if (srcs.sarvam) parts.push(`${srcs.sarvam} sarvam`);
    if (srcs.variant) parts.push(`${srcs.variant} variants`);
    setStatus(parts.length ? parts.join(" · ") : "");
  }

  // ---------- audio encoding ----------
  function floatToInt16(float32) {
    const out = new Int16Array(float32.length);
    for (let i = 0; i < float32.length; i++) {
      const s = Math.max(-1, Math.min(1, float32[i]));
      out[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
    }
    return out;
  }

  function pcmChunksToWav(chunks, sampleRate) {
    let total = 0;
    for (const c of chunks) total += c.length;
    const samples = new Int16Array(total);
    let off = 0;
    for (const c of chunks) { samples.set(c, off); off += c.length; }
    const byteLen = 44 + samples.byteLength;
    const buf = new ArrayBuffer(byteLen);
    const view = new DataView(buf);
    const write = (pos, s) => { for (let i = 0; i < s.length; i++) view.setUint8(pos + i, s.charCodeAt(i)); };
    write(0, "RIFF");
    view.setUint32(4, byteLen - 8, true);
    write(8, "WAVE");
    write(12, "fmt ");
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true);
    view.setUint16(22, 1, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, sampleRate * 2, true);
    view.setUint16(32, 2, true);
    view.setUint16(34, 16, true);
    write(36, "data");
    view.setUint32(40, samples.byteLength, true);
    new Int16Array(buf, 44).set(samples);
    return new Blob([buf], { type: "audio/wav" });
  }

  function downsample(buffer, inputSR, targetSR) {
    if (inputSR === targetSR) return buffer;
    const ratio = inputSR / targetSR;
    const outLen = Math.floor(buffer.length / ratio);
    const out = new Float32Array(outLen);
    let oi = 0, ii = 0;
    while (oi < outLen) {
      const next = Math.floor((oi + 1) * ratio);
      let sum = 0, count = 0;
      for (let i = ii; i < next && i < buffer.length; i++) { sum += buffer[i]; count++; }
      out[oi] = count > 0 ? sum / count : 0;
      oi++; ii = next;
    }
    return out;
  }

  // ---------- recording ----------
  async function startRecording() {
    try {
      mediaStream = await navigator.mediaDevices.getUserMedia({ audio: {
        channelCount: 1, echoCancellation: true, noiseSuppression: true,
      }});
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const inputSR = audioCtx.sampleRate;
      sourceNode = audioCtx.createMediaStreamSource(mediaStream);
      processorNode = audioCtx.createScriptProcessor(4096, 1, 1);
      sourceNode.connect(processorNode);
      processorNode.connect(audioCtx.destination);
      pcmChunks = [];
      vadLastVoiceMs = 0;
      vadVoiceAccumMs = 0;

      processorNode.onaudioprocess = (e) => {
        if (!recording) return;
        const input = e.inputBuffer.getChannelData(0);
        let sumSq = 0;
        for (let i = 0; i < input.length; i++) sumSq += input[i] * input[i];
        const rms = Math.sqrt(sumSq / input.length);
        const now = performance.now();
        const chunkMs = (input.length / inputSR) * 1000;
        if (rms > VAD_SILENCE_RMS) { vadLastVoiceMs = now; vadVoiceAccumMs += chunkMs; }
        const down = downsample(input, inputSR, TARGET_SR);
        pcmChunks.push(floatToInt16(down));
      };

      vadTimer = setInterval(() => {
        if (!recording) return;
        const now = performance.now();
        const quietMs = vadLastVoiceMs ? now - vadLastVoiceMs : 0;
        if (vadVoiceAccumMs >= VAD_MIN_VOICE_MS && quietMs >= VAD_SILENCE_MS) {
          setMicLabel("Silence detected — transcribing");
          stopRecording();
        }
      }, 150);

      recording = true;
      micBtn.classList.add("recording");
      micBtn.textContent = "⏹";
      setMicLabel("🔴 Listening…", "auto-stops on silence");
      setHeard("listening");
      selectedEl.classList.remove("show");
      suggestionsEl.innerHTML = '<li class="empty">Speak clearly — 1 second of silence auto-stops the mic.</li>';
      suggestionsHeader.style.display = "none";
      moreHeader.style.display = "none";
      moreSuggestionsEl.innerHTML = "";
    } catch (err) {
      setStatus(`<span style="color:var(--danger)">Mic error: ${err.message}</span>`);
      setMicLabel("Mic permission needed");
    }
  }

  async function stopRecording() {
    recording = false;
    transcribing = true;
    if (vadTimer) { clearInterval(vadTimer); vadTimer = null; }
    micBtn.classList.remove("recording");
    micBtn.classList.add("transcribing");
    micBtn.textContent = "⏳";
    setMicLabel("Transcribing…");
    setHeard("transcribing");
    try { processorNode?.disconnect(); } catch (_) {}
    try { sourceNode?.disconnect(); } catch (_) {}
    try { mediaStream?.getTracks().forEach(t => t.stop()); } catch (_) {}
    try { audioCtx?.close(); } catch (_) {}
    processorNode = null; sourceNode = null; mediaStream = null; audioCtx = null;

    if (pcmChunks.length === 0) {
      transcribing = false;
      micBtn.classList.remove("transcribing");
      micBtn.textContent = "🎤";
      setMicLabel("Tap the mic and try again");
      setHeard("failed");
      return;
    }
    const wavBlob = pcmChunksToWav(pcmChunks, TARGET_SR);
    pcmChunks = [];

    try {
      const form = new FormData();
      form.append("audio", wavBlob, "recording.wav");
      const res = await fetch("/api/transcribe", { method: "POST", body: form });
      const data = await res.json();
      transcribing = false;
      micBtn.classList.remove("transcribing");
      micBtn.textContent = "🎤";
      setMicLabel("Tap the mic for another name");
      if (data.error) {
        setHeard("failed");
        renderSuggestions([]);
        setStatus(`<span style="color:var(--danger)">${data.error}</span>`);
        return;
      }
      if (!data.transcript) {
        setHeard("failed");
        renderSuggestions([]);
        return;
      }
      setHeard("text", data.transcript);
      // Show the primary card instantly (sub-1s).
      renderSuggestions(data.primary ? [data.primary] : []);
      setStatus(`primary ready · loading alternates…`);
      // Progressive: fetch 3 LLM alternates and fill the rest when ready.
      fetchAlternates(data.transcript, data.primary);
    } catch (err) {
      transcribing = false;
      micBtn.classList.remove("transcribing");
      micBtn.textContent = "🎤";
      setMicLabel("Tap the mic and try again");
      setHeard("failed");
      setStatus(`<span style="color:var(--danger)">${err.message}</span>`);
    }
  }

  micBtn.addEventListener("click", () => {
    if (transcribing) return;
    if (recording) stopRecording();
    else {
      micBtn.textContent = "🎤";
      startRecording();
    }
  });

  resetBtn.addEventListener("click", () => {
    setHeard("empty");
    selectedEl.classList.remove("show");
    selectedEl.innerHTML = "";
    renderSuggestions([]);
    textQuery.value = "";
    setStatus("");
    setMicLabel("Tap the mic and speak a Tamil name");
  });

  async function fetchAlternates(transcript, primary) {
    try {
      const res = await fetch(`/api/suggest?q=${encodeURIComponent(transcript)}&k=4`, { method: "POST" });
      const json = await res.json();
      const all = json.suggestions || [];
      // Keep the primary we already showed (don't replace it with a duplicate).
      const primaryLower = (primary && primary.name || "").toLowerCase();
      const alternates = all.filter(s => (s.name || "").toLowerCase() !== primaryLower);
      const merged = primary ? [primary, ...alternates].slice(0, 4) : all.slice(0, 4);
      renderSuggestions(merged);
      updateBackendStatus(json);
    } catch (_) {
      setStatus("alternates unavailable");
    }
  }

  async function doTextSearch() {
    const q = textQuery.value.trim();
    if (!q) return;
    setHeard("transcribing");
    suggestionsEl.innerHTML = '<li class="empty">Searching…</li>';
    try {
      const res = await fetch(`/api/suggest?q=${encodeURIComponent(q)}&k=4`, { method: "POST" });
      const json = await res.json();
      setHeard("typed", q);
      renderSuggestions(json.suggestions || []);
      updateBackendStatus(json);
    } catch (err) {
      setHeard("failed");
      setStatus(`<span style="color:var(--danger)">${err.message}</span>`);
    }
  }
  searchBtn.addEventListener("click", doTextSearch);
  textQuery.addEventListener("keydown", (e) => { if (e.key === "Enter") doTextSearch(); });

  // Initial backend tag
  fetch("/api/health").then(r => r.json()).then(h => {
    backendTag.textContent = h.sarvam_stt_available
      ? `${h.sarvam_stt_model || "sarvam"}`
      : "offline";
  }).catch(() => { backendTag.textContent = "offline"; });
})();
</script>
</body>
</html>
